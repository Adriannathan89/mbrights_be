name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3

      - name: lint checker
        run: npm run lint

      - name: build .env for CI test
        run: |
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "PORT=${{ secrets.PORT }}" >> .env
          echo "ALLOWED_ORIGINS=${{ secrets.ALLOW_ORIGIN }}" >> .env

      - name: Build application image with Docker compose
        run: docker-compose build app

      - name: Start app stack
        run: docker-compose up -d db app

      - name: Wait for application to be ready
        run: |
          for i in {1..30}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:3031/health | grep -q "200"; then
              echo "App is reachable"
              exit 0
            fi
            echo "Waiting for app..."
            sleep 2
          done

          echo "App did not become ready in time"
          docker compose logs app
          exit 1
      
      - name: Run tests
        run: docker-compose exec app npm test

      - name: Stop app stack
        run: docker-compose down
          