          format: uuid
        vendorId:
          type: string
          format: uuid
        vendorName:
          type: string
        type:
          $ref: '#/components/schemas/TransactionType'
        amount:
          type: string
        currency:
          type: string
        occurredAt:
          type: string
          format: date-time
        description:
          type: string
        payloadHash:
          type: string
        chain:
          $ref: '#/components/schemas/ChainInfo'

    PublicTransactionListResponse:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PublicTransaction'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    PublicVendor:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    PublicVendorListResponse:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
