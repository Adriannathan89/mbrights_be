openapi: 3.0.3
info:
  title: MBRights API
  description: |
    REST API for the MBRights backend (vendor entities, users, draft/release/commit transactions,
    and public transparency endpoints for committed transactions).

    **Conventions:** JSON bodies with `Content-Type: application/json`; resource IDs are UUIDs;
    timestamps are ISO 8601 UTC. Pagination uses query parameters `page` (default 1), `pageSize`
    (default 20, max 100); list responses include `items`, `total`, `page`, `pageSize`.

    Optional sorting: `sort` (field name), `order` (`asc` | `desc`).
  version: 1.0.0

servers:
  - url: https://api.example.com
    description: Production (replace host per deployment)
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Auth
    description: Authentication and session tokens
  - name: Users
    description: User accounts and profile
  - name: Vendors
    description: Vendor entities and metadata
  - name: VendorUsers
    description: User membership and roles per vendor
  - name: Transactions
    description: Per-vendor transactions (draft → release → commit)
  - name: Public
    description: Transparency — committed transactions and public vendor listings
  - name: Internal
    description: Infrastructure webhooks (protected — not for public internet)

security:
  - bearerAuth: []

paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Log in
      description: Returns access and refresh tokens.
      operationId: authLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '400':
          description: Invalid credentials or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Log out
      description: |
        Invalidates the refresh token session. Recommended body is an object with `refreshToken`;
        some implementations may accept a raw string — prefer the object form for consistency.
      operationId: authLogout
      security: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '204':
          description: Logged out (no content)
        '404':
          description: Refresh token not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/refresh-token:
    post:
      tags: [Auth]
      summary: Refresh access token
      operationId: authRefreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: New access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessTokenOnly'
        '400':
          description: Refresh token expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Refresh token not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Current user profile
      description: Profile, vendor memberships, and effective roles (recommended extension).
      operationId: authMe
      responses:
        '200':
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users:
    post:
      tags: [Users]
      summary: Create user
      description: Requires `PLATFORM_ADMIN`.
      operationId: usersCreate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/users/me:
    get:
      tags: [Users]
      summary: Current user profile
      operationId: usersMe
      responses:
        '200':
          description: Profile for the authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users/{userId}:
    patch:
      tags: [Users]
      summary: Update user
      description: Self-service or `PLATFORM_ADMIN`.
      operationId: usersUpdate
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/vendors:
    get:
      tags: [Vendors]
      summary: List vendors
      description: Requires `PLATFORM_ADMIN` or policy-defined access.
      operationId: vendorsList
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
      responses:
        '200':
          description: Paginated vendors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Vendors]
      summary: Create vendor
      description: Requires `PLATFORM_ADMIN`.
      operationId: vendorsCreate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVendorRequest'
      responses:
        '201':
          description: Vendor created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vendor'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/vendors/{vendorId}:
    get:
      tags: [Vendors]
      summary: Get vendor by ID
      description: Platform admin or member of the vendor.
      operationId: vendorsGetById
      parameters:
        - $ref: '#/components/parameters/VendorId'
      responses:
        '200':
          description: Vendor detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vendor'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Vendor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      tags: [Vendors]
      summary: Update vendor
      description: Requires `PLATFORM_ADMIN` or `VENDOR_ADMIN` for this vendor.
      operationId: vendorsUpdate
      parameters:
        - $ref: '#/components/parameters/VendorId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVendorRequest'
      responses:
        '200':
          description: Updated vendor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vendor'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Vendor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/vendors/{vendorId}/users:
    get:
      tags: [VendorUsers]
      summary: List users assigned to vendor
      description: Requires `VENDOR_ADMIN` or `PLATFORM_ADMIN`.
      operationId: vendorUsersList
      parameters:
        - $ref: '#/components/parameters/VendorId'
      responses:
        '200':
          description: Users for this vendor
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserVendorMembership'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Vendor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags: [VendorUsers]
      summary: Assign user to vendor
      description: Requires `PLATFORM_ADMIN` or `VENDOR_ADMIN`.
      operationId: vendorUsersAssign
      parameters:
        - $ref: '#/components/parameters/VendorId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignVendorUserRequest'
      responses:
        '201':
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserVendorMembership'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Vendor or user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/vendors/{vendorId}/users/{userId}:
    delete:
      tags: [VendorUsers]
      summary: Remove user from vendor
      description: Requires `PLATFORM_ADMIN` or `VENDOR_ADMIN`.
      operationId: vendorUsersUnassign
      parameters:
        - $ref: '#/components/parameters/VendorId'
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: Removed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Assignment or vendor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/vendors/{vendorId}/transactions:
    post:
      tags: [Transactions]
      summary: Create draft transaction
      description: Requires `VENDOR_MEMBER` or `VENDOR_ADMIN`.
      operationId: transactionsCreate
      parameters:
        - $ref: '#/components/parameters/VendorId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequest'
      responses:
        '201':
          description: Draft transaction created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Vendor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags: [Transactions]
      summary: List transactions for vendor
      operationId: transactionsList
      parameters:
        - $ref: '#/components/parameters/VendorId'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/TransactionStatus'
        - name: from
          in: query
          description: Filter by occurredAt >= from (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: Filter by occurredAt <= to (ISO 8601)
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
      responses:
        '200':
          description: Paginated transactions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Vendor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/vendors/{vendorId}/transactions/commit-batch:
    post:
      tags: [Transactions]
      summary: Batch commit (optional)
      description: Single on-chain anchor for multiple transactions (e.g. Merkle root).
      operationId: transactionsCommitBatch
      parameters:
        - $ref: '#/components/parameters/VendorId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommitBatchRequest'
      responses:
        '200':
          description: Batch accepted or completed (implementation-specific)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '202':
          description: Batch queued
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/vendors/{vendorId}/transactions/{transactionId}:
    get:
      tags: [Transactions]
      summary: Get transaction
      operationId: transactionsGetById
      parameters:
        - $ref: '#/components/parameters/VendorId'
        - $ref: '#/components/parameters/TransactionId'
      responses:
        '200':
          description: Transaction detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Transaction or vendor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      tags: [Transactions]
      summary: Update transaction (draft only)
      description: Allowed only while status is `DRAFT`.
      operationId: transactionsUpdate
      parameters:
        - $ref: '#/components/parameters/VendorId'
        - $ref: '#/components/parameters/TransactionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTransactionRequest'
      responses:
        '200':
          description: Updated transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          description: Not editable (e.g. not DRAFT)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Transactions]
      summary: Delete draft transaction
      description: Optional; typically requires `VENDOR_ADMIN` and `DRAFT` status.
      operationId: transactionsDelete
      parameters:
        - $ref: '#/components/parameters/VendorId'
        - $ref: '#/components/parameters/TransactionId'
      responses:
        '204':
          description: Deleted
        '400':
          description: Not deletable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/vendors/{vendorId}/transactions/{transactionId}/release:
    post:
      tags: [Transactions]
      summary: Release transaction for commit
      description: Transitions `DRAFT` → `RELEASED`. Requires `VENDOR_ADMIN`.
      operationId: transactionsRelease
      parameters:
        - $ref: '#/components/parameters/VendorId'
        - $ref: '#/components/parameters/TransactionId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseTransactionRequest'
      responses:
        '200':
          description: Transaction released
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/vendors/{vendorId}/transactions/{transactionId}/commit:
    post:
      tags: [Transactions]
      summary: Commit transaction on-chain
      description: |
        Queues or submits blockchain transaction. Source must be `RELEASED` (not `DRAFT`).
        Send `Idempotency-Key` (max 128 chars) to avoid duplicate commits.
      operationId: transactionsCommit
      parameters:
        - $ref: '#/components/parameters/VendorId'
        - $ref: '#/components/parameters/TransactionId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Commit completed synchronously
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommitSyncResponse'
        '202':
          description: Commit accepted asynchronously
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommitAsyncResponse'
        '400':
          description: e.g. `TRANSACTION_NOT_RELEASED`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: e.g. `COMMIT_IN_PROGRESS` or idempotency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/public/transactions:
    get:
      tags: [Public]
      summary: List committed transactions (public)
      description: Only `COMMITTED` transactions; sensitive metadata may be filtered by policy.
      operationId: publicTransactionsList
      security: []
      parameters:
        - name: vendorId
          in: query
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated public transaction summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicTransactionListResponse'

  /api/v1/public/transactions/{transactionId}:
    get:
      tags: [Public]
      summary: Public transaction detail
      description: Committed transaction with chain proof.
      operationId: publicTransactionsGetById
      security: []
      parameters:
        - $ref: '#/components/parameters/TransactionId'
      responses:
        '200':
          description: Public transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicTransaction'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/public/vendors:
    get:
      tags: [Public]
      summary: List public vendors
      description: Minimal fields (e.g. id and name) without internal operational data.
      operationId: publicVendorsList
      security: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated public vendor records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicVendorListResponse'

  /api/v1/public/vendors/{vendorId}/summary:
    get:
      tags: [Public]
      summary: Public vendor summary
      description: Light aggregates (e.g. committed tx count, date range).
      operationId: publicVendorSummary
      security: []
      parameters:
        - $ref: '#/components/parameters/VendorId'
      responses:
        '200':
          description: Summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicVendorSummary'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/internal/webhooks/chain-confirmed:
    post:
      tags: [Internal]
      summary: Chain confirmation webhook
      description: |
        Worker updates `COMMIT_PENDING` → `COMMITTED` with `txHash` / `blockNumber`.
        Must not be exposed without protection (secret, IP allowlist, or mTLS).
      operationId: internalChainConfirmedWebhook
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Processed
        '400':
          $ref: '#/components/responses/BadRequest'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        `Authorization: Bearer <accessToken>`

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Sort:
      name: sort
      in: query
      description: Field name to sort by
      schema:
        type: string
    Order:
      name: order
      in: query
      schema:
        type: string
        enum: [asc, desc]
    VendorId:
      name: vendorId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TransactionId:
      name: transactionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Opaque idempotency token for commit (max 128 characters)
      schema:
        type: string
        maxLength: 128

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Authenticated but not allowed for this resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      description: Uniform error envelope
      required: [statusCode, message]
      properties:
        statusCode:
          type: integer
          # examples: [400, 401, 403, 404, 409]
        error:
          type: string
          # examples: [Bad Request, Unauthorized]
        message:
          type: string
          description: Human-readable message
        code:
          type: string
          description: |
            Stable machine code for clients (e.g. `TRANSACTION_NOT_RELEASED`, `UNAUTHORIZED`,
            `IDEMPOTENCY_REPLAY`).

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          description: JWT refresh token

    TokenPair:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string

    AccessTokenOnly:
      type: object
      required: [accessToken]
      properties:
        accessToken:
          type: string

    GlobalRole:
      type: string
      enum: [PLATFORM_ADMIN, VENDOR_ADMIN, VENDOR_MEMBER, AUDITOR]

    VendorScopedRole:
      type: string
      enum: [VENDOR_ADMIN, VENDOR_MEMBER, AUDITOR]

    VendorMembership:
      type: object
      required: [vendorId, role, joinedAt]
      properties:
        vendorId:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/VendorScopedRole'
        joinedAt:
          type: string
          format: date-time

    UserProfile:
      type: object
      required: [id, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        username:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/GlobalRole'
        vendorMemberships:
          type: array
          items:
            $ref: '#/components/schemas/VendorMembership'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateUserRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
        email:
          type: string
          format: email
        name:
          type: string

    UpdateUserRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
        email:
          type: string
          format: email
        name:
          type: string

    Vendor:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        externalRef:
          type: string
          description: Optional external program reference ID
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateVendorRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        externalRef:
          type: string
        metadata:
          type: object
          additionalProperties: true

    UpdateVendorRequest:
      type: object
      properties:
        name:
          type: string
        externalRef:
          type: string
        metadata:
          type: object
          additionalProperties: true

    VendorListResponse:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Vendor'
        total:
          type: integer
          minimum: 0
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1

    AssignVendorUserRequest:
      type: object
      required: [userId, role]
      properties:
        userId:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/VendorScopedRole'

    UserVendorMembership:
      type: object
      required: [userId, vendorId, role]
      properties:
        userId:
          type: string
          format: uuid
        vendorId:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/VendorScopedRole'
        joinedAt:
          type: string
          format: date-time

    TransactionStatus:
      type: string
      enum:
        - DRAFT
        - RELEASED
        - COMMIT_PENDING
        - COMMITTED
        - COMMIT_FAILED

    TransactionType:
      type: string
      enum: [EXPENSE, INCOME, TRANSFER]

    ChainInfo:
      type: object
      description: Present when committed; fields depend on deployment
      properties:
        chainId:
          type: integer
          # examples: [11155111]
        txHash:
          type: string
          # examples: ['0xabc...']
        blockNumber:
          type: integer
          minimum: 0
        contractAddress:
          type: string
        anchorId:
          type: string

    Transaction:
      type: object
      required:
        - id
        - vendorId
        - status
        - type
        - amount
        - currency
        - occurredAt
      properties:
        id:
          type: string
          format: uuid
        vendorId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/TransactionStatus'
        type:
          $ref: '#/components/schemas/TransactionType'
        amount:
          type: string
          description: Numeric string to avoid floating-point precision issues
          pattern: '^[0-9]+(\.[0-9]+)?$'
        currency:
          type: string
          # examples: [IDR]
        occurredAt:
          type: string
          format: date-time
        description:
          type: string
        metadata:
          type: object
          additionalProperties: true
        releasedAt:
          type: string
          format: date-time
        releasedByUserId:
          type: string
          format: uuid
        commitRequestedAt:
          type: string
          format: date-time
        committedAt:
          type: string
          format: date-time
        payloadHash:
          type: string
          description: Canonical payload hash (e.g. 0x + 64 hex)
          # examples: ['0xabcdef0123456789...']
        chain:
          $ref: '#/components/schemas/ChainInfo'

    CreateTransactionRequest:
      type: object
      required: [type, amount, currency, occurredAt]
      properties:
        type:
          $ref: '#/components/schemas/TransactionType'
        amount:
          type: string
        currency:
          type: string
        occurredAt:
          type: string
          format: date-time
        description:
          type: string
        metadata:
          type: object
          additionalProperties: true

    UpdateTransactionRequest:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/TransactionType'
        amount:
          type: string
        currency:
          type: string
        occurredAt:
          type: string
          format: date-time
        description:
          type: string
        metadata:
          type: object
          additionalProperties: true

    ReleaseTransactionRequest:
      type: object
      properties:
        note:
          type: string

    CommitAsyncResponse:
      type: object
      required: [transactionId, status]
      properties:
        transactionId:
          type: string
          format: uuid
        status:
          type: string
          enum: [COMMIT_PENDING]
        commitJobId:
          type: string
          format: uuid

    CommitSyncResponse:
      type: object
      required: [transactionId, status]
      properties:
        transactionId:
          type: string
          format: uuid
        status:
          type: string
          enum: [COMMITTED]
        payloadHash:
          type: string
        chain:
          $ref: '#/components/schemas/ChainInfo'

    CommitBatchRequest:
      type: object
      required: [transactionIds]
      properties:
        transactionIds:
          type: array
          items:
            type: string
            format: uuid
        note:
          type: string

    TransactionListResponse:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
        total:
          type: integer
          minimum: 0
        page:
          type: integer
        pageSize:
          type: integer

    PublicTransaction:
      type: object
      required: [id, vendorId, type, amount, currency, occurredAt]
      properties:
        id:
